<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Questionnaire patient — KCS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f1117;--surface:#1e2030;--surface2:#252840;--border:#2e3250;--border2:#3d4270;
  --text:#e8eaf6;--text2:#9fa8da;--text3:#5c6bc0;
  --accent:#6c63ff;--accent2:#8b80ff;--accent-bg:rgba(108,99,255,0.12);--accent-border:rgba(108,99,255,0.35);
  --success:#00e676;--success-bg:rgba(0,230,118,0.1);--success-border:rgba(0,230,118,0.3);
  --warning:#ffd740;--danger:#ff5252;--danger-bg:rgba(255,82,82,0.1);
  --radius:10px;--radius-lg:16px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;padding-bottom:40px;}
.header{padding:16px 20px;background:linear-gradient(135deg,var(--surface),var(--surface2));border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10;}
.logo{height:36px;width:auto;}
.header-text h1{font-size:14px;font-weight:700;color:var(--text);}
.header-text p{font-size:11px;color:var(--text3);}
.progress-bar{height:3px;background:var(--border);}
.progress-fill{height:100%;background:var(--accent);transition:width 0.4s;border-radius:2px;}
.page{display:none;padding:20px;animation:fadeIn 0.25s ease;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.section-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px;}
.section-sub{font-size:13px;color:var(--text3);margin-bottom:20px;line-height:1.5;}
.card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:18px;margin-bottom:14px;}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.field label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);}
input[type=text],input[type=date],select,textarea{font-family:inherit;font-size:15px;color:var(--text);background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 14px;width:100%;outline:none;transition:all 0.2s;-webkit-appearance:none;}
input:focus,select:focus{border-color:var(--accent);background:#1a1e32;}
.q-block{margin-bottom:20px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);}
.q-num{font-size:11px;font-weight:700;color:var(--accent2);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em;}
.q-text{font-size:14px;font-weight:500;color:var(--text);margin-bottom:14px;line-height:1.55;}
.slider-wrap{display:flex;flex-direction:column;gap:6px;}
.slider-row{display:flex;align-items:center;gap:12px;}
input[type=range]{flex:1;height:6px;accent-color:var(--accent);cursor:pointer;}
.slider-val{font-size:20px;font-weight:800;font-family:monospace;min-width:40px;text-align:center;color:var(--accent2);}
.slider-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);}
.opts-grid{display:flex;gap:8px;flex-wrap:wrap;}
.opt-btn{flex:1;min-width:calc(50% - 4px);padding:11px 8px;border:1px solid var(--border2);border-radius:var(--radius);text-align:center;cursor:pointer;font-size:13px;color:var(--text2);background:transparent;transition:all 0.15s;-webkit-tap-highlight-color:transparent;font-family:inherit;}
.opt-btn.sel{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent2);font-weight:600;}
.sec-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:14px;border:1px solid;}
.badge-eva{background:rgba(255,82,82,0.1);border-color:rgba(255,82,82,0.3);color:#ff5252;}
.badge-score{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent2);}
.badge-tampa{background:rgba(255,215,64,0.1);border-color:rgba(255,215,64,0.3);color:var(--warning);}
.nav-btns{display:flex;gap:12px;margin-top:24px;}
.btn{flex:1;padding:14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s;-webkit-tap-highlight-color:transparent;}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.done-wrap{text-align:center;padding:30px 20px;}
.done-icon{font-size:54px;margin-bottom:16px;}
.done-title{font-size:20px;font-weight:700;margin-bottom:8px;}
.done-sub{font-size:13px;color:var(--text3);margin-bottom:20px;line-height:1.6;}
.score-preview{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:16px 0;}
.score-chip{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:700;border:1px solid;}
.score-chip.good{background:var(--success-bg);border-color:var(--success-border);color:var(--success);}
.score-chip.mid{background:rgba(255,215,64,0.1);border-color:rgba(255,215,64,0.3);color:var(--warning);}
.score-chip.bad{background:var(--danger-bg);border-color:rgba(255,82,82,0.3);color:var(--danger);}
.code-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:12px;word-break:break-all;font-size:10px;font-family:monospace;color:var(--accent2);margin:10px 0;text-align:left;max-height:80px;overflow-y:auto;}
.copy-btn{width:100%;padding:13px;background:var(--success-bg);border:1px solid var(--success-border);border-radius:var(--radius);color:var(--success);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px;}
.dots{display:flex;justify-content:center;gap:6px;margin-bottom:18px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--border2);transition:all 0.3s;}
.dot.active{background:var(--accent);width:22px;border-radius:4px;}
.dot.done{background:var(--success);}
</style>
</head>

:80,slider:true,skip_if:'genou',questions:[{q:"Minutes assis sans douleur au tendon d'Achille ?",lmin:'0 min',lmax:'60 min ou plus'},{q:'Douleur en marchant sur terrain plat ?',lmin:'Douleur severe',lmax:'Pas de douleur'},{q:'Douleur en descendant les escaliers ?',lmin:'Douleur severe',lmax:'Pas de douleur'},{q:'Douleur extension sur pointe une jambe ?',lmin:'Douleur severe',lmax:'Pas de douleur'},{q:'Douleur flexion plantaire maximale ?',lmin:'Douleur severe',lmax:'Pas de douleur'},{q:'Douleur saut une seule jambe ?',lmin:'Douleur severe',lmax:'Pas de douleur'},{q:'Niveau de pratique sportive actuel ?',lmin:'Pas du tout',lmax:'Pleine capacite'},{q:"Problemes au tendon d'Achille ces 7 derniers jours ?",lmin:'Impossible',lmax:'Aucun probleme'}]},tampa:{label:'Tampa Scale',badge:'badge-tampa',max:44,questions:[{q:"J'ai peur de me blesser si je fais de l'exercice.",opts:['Pas du tout','Plutot pas','Plutot oui','Tout a fait'],vals:[1,2,3,4]},{q:"Si j'essayais de surmonter cette douleur, elle augmenterait.",opts:['Pas du tout','Plutot pas','Plutot oui','Tout a fait'],vals:[1,2,3,4]},{q:'Mon corps me dit que quelque chose de serieux se passe.',opts:['Pas du tout','Plutot pas','Plutot oui','Tout a fait'],vals:[1,2,3,4]},{q:'Les gens ne prennent pas ma condition medicale au serieux.',opts:['Pas du tout','Plutot pas','Plutot oui','Tout a fait'],vals:[1,2,3,4]},{q:'Mon probleme a mis mon corps en danger pour le restant de ma vie.',opts:['Pas du tout','Plutot pas','Plutot oui','Tout a fait'],vals:[1,2,3,4]},{q:"La douleur m'indique toujours que j'ai blesse mon corps.",opts:['Pas du tout','Plutot pas','Plutot oui','Tout a fait'],vals:[1,2,3,4]},{q:"J'ai peur de me blesser accidentellement.",opts:['Pas du tout','Plutot pas','Plutot oui','Tout a fait'],vals:[1,2,3,4]},{q:"La chose la plus sure est d'eviter le mouvement inutile.",opts:['Pas du tout','Plutot pas','Plutot oui','Tout a fait'],vals:[1,2,3,4]},{q:'Je pourrais avoir moins de douleur si rien de dangereux ne se passait.',opts:['Pas du tout','Plutot pas','Plutot oui','Tout a fait'],vals:[1,2,3,4]},{q:'La douleur est toujours synonyme de blessure.',opts:['Pas du tout','Plutot pas','Plutot oui','Tout a fait'],vals:[1,2,3,4]},{q:'Je ne devrais pas faire des activites qui aggravent ma douleur.',opts:['Pas du tout','Plutot pas','Plutot oui','Tout a fait'],vals:[1,2,3,4]}]}};
var bilanType='tendon';var bilanConfig=null;var pages=[];var currentPage=0;var answers={};var evaAnswers={};var sliderAnswers={};
function init(){var params=new URLSearchParams(window.location.search);var b=params.get('bilan')||'tendon';if(BILANS[b]){bilanType=b;bilanConfig=BILANS[b];}else{bilanType='tendon';bilanConfig=BILANS.tendon;}document.getElementById('header-title').textContent=bilanConfig.titre;buildPages();renderPage(0);}
function buildPages(){pages=[];pages.push({type:'infos'});if(bilanConfig.evas&&bilanConfig.evas.length>0)pages.push({type:'eva'});bilanConfig.scores.forEach(function(sid){var sc=SCORES_DEF[sid];if(!sc)return;if(sc.subsections){sc.subsections.forEach(function(sub,si){pages.push({type:'score',sid:sid,sub:si,label:sc.label+' - '+sub.label});});}else{pages.push({type:'score',sid:sid,sub:null,label:sc.label});}});pages.push({type:'result'});}
function renderPage(idx){var container=document.getElementById('pages-container');container.innerHTML='';var p=pages[idx];var div=document.createElement('div');div.className='page active';var dots='<div class="dots">';pages.forEach(function(pg,i){var cls=i<idx?'done':i===idx?'active':'';dots+='<div class="dot '+cls+'"></div>';});dots+='</div>';var html=dots;if(p.type==='infos')html+=buildInfosPage();else if(p.type==='eva')html+=buildEvaPage();else if(p.type==='score')html+=buildScorePage(p);else if(p.type==='result')html+=buildResultPage();div.innerHTML=html;container.appendChild(div);div.querySelectorAll('input[type=range]').forEach(function(s){var vel=document.getElementById(s.id+'-val');if(vel){vel.textContent=s.value;var isEva=bilanConfig.evas&&bilanConfig.evas.some(function(e){return e.id===s.id;});if(isEva)colorEva(vel,parseInt(s.value));else colorVal(vel,parseInt(s.value));}});updateProgress();window.scrollTo({top:0,behavior:'smooth'});}
function colorVal(el,v){el.style.color=v<=3?'var(--danger)':v<=6?'var(--warning)':'var(--success)';}
function colorEva(el,v){el.style.color=v<=3?'var(--success)':v<=6?'var(--warning)':'var(--danger)';}
function updSlider(id){var el=document.getElementById(id);var vel=document.getElementById(id+'-val');if(!el||!vel)return;vel.textContent=el.value;colorVal(vel,parseInt(el.value));}
function updSliderEva(id){var el=document.getElementById(id);var vel=document.getElementById(id+'-val');if(!el||!vel)return;vel.textContent=el.value;colorEva(vel,parseInt(el.value));}
function updateProgress(){var pct=pages.length>1?Math.round((currentPage/(pages.length-1))*100):0;document.getElementById('prog-fill').style.width=pct+'%';}
function buildInfosPage(){var tendonOpts=bilanType==='tendon'?'<div class="field"><label>Tendon douloureux</label><select id="p-tendon"><option value="">Selectionner</option><option value="patellaire">Tendon patellaire (devant genou)</option><option value="quadricipital">Tendon quadriceps</option><option value="achille-moy">Tendon Achille - milieu</option><option value="achille-ins">Tendon Achille - insertion talon</option><option value="autre">Autre</option></select></div>':'';var rachisOpts=bilanType==='rachis'?'<div class="field"><label>Region principale</label><select id="p-region"><option value="">Selectionner</option><option value="cervical">Cervical</option><option value="lombaire">Lombaire</option><option value="thoracique">Thoracique</option><option value="multiple">Plusieurs regions</option></select></div>':'';return'<div class="section-title">Vos informations</div><div class="section-sub">Ces donnees seront transmises a votre kinesitherapeute.</div><div class="card"><div class="field"><label>Nom</label><input type="text" id="p-nom" placeholder="Dupont" autocomplete="family-name"></div><div class="field"><label>Prenom</label><input type="text" id="p-prenom" placeholder="Jean" autocomplete="given-name"></div><div class="field"><label>Date de naissance</label><input type="date" id="p-ddn" autocomplete="bday"></div><div class="field"><label>Sport pratique</label><input type="text" id="p-sport" placeholder="Football, course..."></div>'+tendonOpts+rachisOpts+'<div class="field"><label>Cote douloureux</label><select id="p-cote"><option value="">Selectionner</option><option value="droit">Droit</option><option value="gauche">Gauche</option><option value="bilateral">Bilateral</option></select></div><div class="field"><label>Depuis combien de temps ?</label><select id="p-anciennete"><option value="">Selectionner</option><option value="aigu">Moins de 2 semaines</option><option value="subaigu">2 a 6 semaines</option><option value="chronique">Plus de 6 semaines</option><option value="recidive">Recidive</option></select></div></div>'+buildNavBtns(false,true);}
function buildEvaPage(){var html='<div class="sec-badge badge-eva">Douleur EVA</div><div class="section-title">Vos douleurs</div><div class="section-sub">Deplacez chaque curseur de 0 a 10.</div>';bilanConfig.evas.forEach(function(e){html+='<div class="q-block"><div class="q-text">'+e.label+'</div><div class="slider-wrap"><div class="slider-row"><input type="range" min="0" max="10" step="1" value="0" id="'+e.id+'" oninput="updSliderEva(\''+e.id+'\')"><span class="slider-val" id="'+e.id+'-val" style="color:var(--success)">0</span></div><div class="slider-labels"><span>Aucune douleur</span><span>Douleur maximale</span></div></div></div>';});return html+buildNavBtns(true,true);}
function buildScorePage(p){var sc=SCORES_DEF[p.sid];var questions=p.sub!==null?sc.subsections[p.sub].questions:sc.questions;var label=p.label||sc.label;var html='<div class="sec-badge '+sc.badge+'">'+label+'</div>';if(sc.slider){questions.forEach(function(q,qi){var qid=p.sid+'_'+(p.sub!==null?p.sub+'_':'')+qi;html+='<div class="q-block"><div class="q-num">Question '+(qi+1)+' / '+questions.length+'</div><div class="q-text">'+q.q+'</div><div class="slider-wrap"><div class="slider-row"><input type="range" min="0" max="10" step="1" value="5" id="'+qid+'" oninput="updSlider(\''+qid+'\')"><span class="slider-val" id="'+qid+'-val" style="color:var(--warning)">5</span></div><div class="slider-labels"><span>'+(q.lmin||'0')+'</span><span>'+(q.lmax||'10')+'</span></div></div></div>';});}else{questions.forEach(function(q,qi){var qid=p.sid+'_'+(p.sub!==null?p.sub+'_':'')+qi;html+='<div class="q-block"><div class="q-num">Question '+(qi+1)+' / '+questions.length+'</div><div class="q-text">'+q.q+'</div><div class="opts-grid">';q.opts.forEach(function(o,oi){html+='<div class="opt-btn" data-qid="'+qid+'" data-val="'+q.vals[oi]+'" onclick="selOpt(this)">'+o+'</div>';});html+='</div></div>';});}return html+buildNavBtns(true,true);}
function buildResultPage(){return'<div class="done-wrap"><div class="done-icon">&#10003;</div><div class="done-title">Questionnaire complete !</div><div class="done-sub">Montrez ce QR code a votre kinesitherapeute. Il le scanne et vos reponses s\'importent directement dans votre bilan.</div><div class="score-preview" id="score-preview"></div><div style="background:#fff;display:inline-block;padding:18px;border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,0.35);margin:16px 0;"><div id="result-qr" style="width:240px;height:240px;"></div></div><div style="font-size:13px;color:var(--text3);margin-bottom:14px;line-height:1.6;">Votre kinesitherapeute scanne ce QR code avec sa tablette.</div><details style="margin-top:6px;"><summary style="font-size:12px;color:var(--text3);cursor:pointer;padding:8px 0;">&#9658; Afficher le code texte</summary><div class="code-box" id="result-code">...</div><button class="copy-btn" onclick="copyCode()">Copier le code</button></details></div>';}
function buildNavBtns(showPrev,showNext){var html='<div class="nav-btns">';if(showPrev)html+='<button class="btn" onclick="prevPage()">&#8592; Retour</button>';if(showNext)html+='<button class="btn btn-primary" onclick="nextPage()">Continuer &#8594;</button>';html+='</div>';return html;}
function nextPage(){if(currentPage===0){var nom=document.getElementById('p-nom');if(!nom||!nom.value.trim()){alert('Veuillez indiquer votre nom.');return;}}saveCurrentPage();var nextIdx=currentPage+1;if(bilanType==='tendon'){var tv=answers['p-tendon']||'';var isGenou=tv==='patellaire'||tv==='quadricipital';var isAchille=tv==='achille-moy'||tv==='achille-ins';while(nextIdx<pages.length-1){var np=pages[nextIdx];if(np.type==='score'){var sc=SCORES_DEF[np.sid];if(sc&&sc.skip_if){if(isAchille&&sc.skip_if==='achille'){nextIdx++;continue;}if(isGenou&&sc.skip_if==='genou'){nextIdx++;continue;}}}break;}}else if(bilanType==='rachis'){var rv=answers['p-region']||'';while(nextIdx<pages.length-1){var np2=pages[nextIdx];if(np2.type==='score'){if(rv==='cervical'&&np2.sid==='odi'){nextIdx++;continue;}if(rv==='lombaire'&&np2.sid==='ndi'){nextIdx++;continue;}}break;}}if(nextIdx>=pages.length)return;currentPage=nextIdx;if(currentPage===pages.length-1){saveCurrentPage();generateResult();}renderPage(currentPage);}
function prevPage(){if(currentPage<=0)return;saveCurrentPage();currentPage--;renderPage(currentPage);}
function selOpt(el){var qid=el.dataset.qid;document.querySelectorAll('[data-qid="'+qid+'"]').forEach(function(o){o.classList.remove('sel');});el.classList.add('sel');}
function saveCurrentPage(){var p=pages[currentPage];if(p.type==='infos'){['p-nom','p-prenom','p-ddn','p-sport','p-cote','p-anciennete','p-tendon','p-region'].forEach(function(f){var el=document.getElementById(f);if(el)answers[f]=el.value;});}else if(p.type==='eva'){bilanConfig.evas.forEach(function(e){var el=document.getElementById(e.id);if(el)evaAnswers[e.id]=parseInt(el.value)||0;});}else if(p.type==='score'){var sc=SCORES_DEF[p.sid];var questions=p.sub!==null?sc.subsections[p.sub].questions:sc.questions;if(sc.slider){questions.forEach(function(q,qi){var qid=p.sid+'_'+(p.sub!==null?p.sub+'_':'')+qi;var el=document.getElementById(qid);if(el)sliderAnswers[qid]=parseInt(el.value);});}else{questions.forEach(function(q,qi){var qid=p.sid+'_'+(p.sub!==null?p.sub+'_':'')+qi;var sel=document.querySelector('[data-qid="'+qid+'"].sel');if(sel)sliderAnswers[qid]=parseInt(sel.dataset.val);});}}}
function generateResult(){var data={bilan:bilanType,nom:answers['p-nom']||'',prenom:answers['p-prenom']||'',ddn:answers['p-ddn']||'',sport:answers['p-sport']||'',cote:answers['p-cote']||'',anciennete:answers['p-anciennete']||'',tendon:answers['p-tendon']||'',region:answers['p-region']||'',eva:evaAnswers,scores:sliderAnswers,ts:Date.now()};var code='KCS1:'+btoa(unescape(encodeURIComponent(JSON.stringify(data))));var previewHtml='';bilanConfig.scores.forEach(function(sid){var sc=SCORES_DEF[sid];if(!sc)return;var total=0;var count=0;Object.keys(sliderAnswers).forEach(function(k){if(k.startsWith(sid+'_')){total+=sliderAnswers[k];count++;}});if(count>0){var pct=Math.round((total/(count*10))*100);var cls=pct>=70?'good':pct>=40?'mid':'bad';previewHtml+='<div class="score-chip '+cls+'">'+sc.label.split(' ')[0]+' : '+pct+'%</div>';}});var evaVals=Object.values(evaAnswers);if(evaVals.length>0){var mx=Math.max.apply(null,evaVals);var cls2=mx<=3?'good':mx<=6?'mid':'bad';previewHtml+='<div class="score-chip '+cls2+'">Douleur max : '+mx+'/10</div>';}setTimeout(function(){var sp=document.getElementById('score-preview');if(sp)sp.innerHTML=previewHtml;var rc=document.getElementById('result-code');if(rc)rc.textContent=code;var qrDiv=document.getElementById('result-qr');if(qrDiv){qrDiv.innerHTML='';try{new QRCode(qrDiv,{text:code,width:240,height:240,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});}catch(e){qrDiv.innerHTML='<div style="color:#ff5252;padding:20px;font-size:12px;">Erreur QR - utilisez le code texte</div>';}}},100);}
function copyCode(){var code=document.getElementById('result-code').textContent;if(navigator.clipboard){navigator.clipboard.writeText(code).then(function(){var btn=document.querySelector('.copy-btn');if(btn){btn.textContent='Copie OK !';setTimeout(function(){btn.textContent='Copier le code';},2000);}});}else{var ta=document.createElement('textarea');ta.value=code;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}};
init();
