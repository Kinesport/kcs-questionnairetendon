<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0f1117;--surface:#1e2030;--surface2:#252840;--border:#2e3250;--border2:#3d4270;--text:#e8eaf6;--text2:#9fa8da;--text3:#5c6bc0;--accent:#6c63ff;--accent2:#8b80ff;--accent-bg:rgba(108,99,255,0.12);--accent-border:rgba(108,99,255,0.35);--success:#00e676;--success-bg:rgba(0,230,118,0.1);--success-border:rgba(0,230,118,0.3);--warning:#ffd740;--danger:#ff5252;--danger-bg:rgba(255,82,82,0.1);--radius:10px;--radius-lg:16px;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
.header{padding:18px 28px;background:linear-gradient(135deg,var(--surface),var(--surface2));border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:16px;}
.logo{height:40px;} .hdiv{width:1px;height:32px;background:var(--border2);}
.htxt h1{font-size:16px;font-weight:700;} .htxt p{font-size:11px;color:var(--text3);}
.main{padding:20px;max-width:900px;margin:0 auto;}
.card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:18px;margin-bottom:14px;}
.ctitle{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--text);background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 12px;width:100%;outline:none;transition:border-color 0.2s;}
input:focus,select:focus{border-color:var(--accent);}
.row{display:flex;gap:10px;flex-wrap:wrap;}
.row .field{flex:1;min-width:120px;}
.btn{padding:10px 18px;border-radius:var(--radius);border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.btn-p{background:var(--accent);color:#fff;}
.btn-s{background:var(--surface2);color:var(--text2);border:1px solid var(--border2);}
.btn-d{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(255,82,82,0.3);}
.tabs{display:flex;gap:4px;margin-bottom:14px;background:var(--surface2);border-radius:var(--radius);padding:4px;}
.tab{flex:1;padding:8px;border-radius:8px;border:none;background:transparent;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.2);}
.sess-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;}
.sess-date{font-size:11px;font-weight:700;color:var(--accent2);min-width:65px;line-height:1.4;}
.sess-chips{display:flex;gap:6px;flex-wrap:wrap;flex:1;}
.chip{font-size:11px;padding:3px 9px;border-radius:10px;border:1px solid;font-weight:600;}
.chip.good{background:var(--success-bg);border-color:var(--success-border);color:var(--success);}
.chip.mid{background:rgba(255,215,64,0.1);border-color:rgba(255,215,64,0.3);color:var(--warning);}
.chip.bad{background:var(--danger-bg);border-color:rgba(255,82,82,0.3);color:var(--danger);}
.sess-note{font-size:11px;color:var(--text3);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sess-del{color:var(--danger);font-size:16px;cursor:pointer;opacity:0.5;padding:0 4px;flex-shrink:0;}
.sess-del:hover{opacity:1;}
.chart-wrap{position:relative;height:260px;margin-top:8px;}
.empty{padding:24px;text-align:center;color:var(--text3);font-size:13px;}
</style>

  <div class="hdiv"></div>
  <div class="htxt"><h1>Suivi longitudinal patient</h1><p>Evolution des scores dans le temps</p></div>
</div>
<div id="sync-status" style="display:none;padding:6px 20px;font-size:12px;font-weight:600;text-align:center;"></div><div class="main">
  <div class="card">
    <div class="ctitle">Patient</div>
    <div class="row">
      <div class="field"><label>Nom</label><input type="text" id="p-nom" placeholder="Dupont" oninput="saveMeta()"></div>
      <div class="field"><label>Prenom</label><input type="text" id="p-prenom" placeholder="Jean" oninput="saveMeta()"></div>
      <div class="field"><label>Date de naissance</label><input type="date" id="p-ddn" oninput="saveMeta()"></div>
      <div class="field"><label>Type de bilan</label>
        <select id="p-type" onchange="saveMeta();renderAll()">
          <option value="epaule">Epaule</option>
          <option value="genou">Genou / Sport</option>
          <option value="cheville">Cheville</option>
          <option value="musculaire">Lesion musculaire</option>
          <option value="pubalgie">Pubalgie</option>
          <option value="hanche">Hanche</option>
          <option value="rachis">Rachis</option>
          <option value="tendon">Tendinopathie</option>
        </select>
      </div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-saisie" onclick="switchTab('saisie')">Saisie</button>
    <button class="tab" id="tab-graphes" onclick="switchTab('graphes')">Graphiques</button>
    <button class="tab" id="tab-tableau" onclick="switchTab('tableau')">Tableau comparatif</button>
  </div>
  <div id="pane-saisie">
    <div class="card">
      <div class="ctitle">Ajouter une evaluation</div>
      <div class="row">
        <div class="field"><label>Date</label><input type="date" id="eval-date"></div>
        <div class="field"><label>Seance n</label><input type="number" id="eval-seance" placeholder="1" min="1"></div>
        <div class="field"><label>EVA repos</label><input type="number" id="eval-eva-repos" placeholder="0-10" min="0" max="10"></div>
        <div class="field"><label>EVA effort</label><input type="number" id="eval-eva-effort" placeholder="0-10" min="0" max="10"></div>
      </div>
      <div id="scores-fields"></div>
      <div class="field"><label>Notes cliniques</label><textarea id="eval-notes" placeholder="Evolution, observations..." style="min-height:56px;resize:vertical;"></textarea></div>
      <div style="display:flex;gap:10px;margin-top:4px;flex-wrap:wrap;">
        <button class="btn btn-p" onclick="ajouterEval()">+ Ajouter</button>
        <button class="btn btn-s" onclick="toggleImport()">Importer code KCS1:</button>
      </div>
      <div id="import-zone" style="display:none;margin-top:10px;">
        <textarea id="kcs-code" placeholder="Collez le code KCS1: ici..." style="font-family:monospace;font-size:11px;min-height:56px;resize:vertical;"></textarea>
        <button class="btn btn-p" style="margin-top:8px;width:100%;" onclick="lireCode()">Importer</button>
      </div>
    </div>
    <div class="card">
      <div class="ctitle">Historique <span id="nb-sess" style="margin-left:auto;font-size:11px;color:var(--text3);font-weight:400;"></span></div>
      <div id="sess-list"><div class="empty">Aucune evaluation</div></div>
    </div>
  </div>
  <div id="pane-graphes" style="display:none;">
    <div class="card"><div class="ctitle">Douleur (EVA)</div><div class="chart-wrap"><canvas id="chart-eva"></canvas></div></div>
    <div class="card"><div class="ctitle">Scores fonctionnels</div><div class="chart-wrap"><canvas id="chart-scores"></canvas></div></div>
  </div>
  <div id="pane-tableau" style="display:none;">
    <div class="card"><div class="ctitle">Tableau comparatif</div><div id="tableau-content"><div class="empty">Ajoutez au moins 2 evaluations</div></div></div>
    <div style="display:flex;gap:10px;margin-top:10px;">
      <button class="btn btn-p" onclick="window.print()">Imprimer</button>
      <button class="btn" onclick="clearAll()">Tout effacer</button>
    </div>
  </div>
</div>

<script>
var SCORES_CFG = {
  epaule:     [{id:'quickdash',label:'QuickDASH',seuil:25,inv:true}],
  genou:      [{id:'koos',  label:'KOOS Sport',seuil:75},{id:'aclrsi',label:'ACL-RSI',seuil:77}],
  cheville:   [{id:'faamdl',label:'FAAM ADL', seuil:80},{id:'faasp', label:'FAAM Sport',seuil:80},{id:'fadi',label:'FADI',seuil:80}],
  musculaire: [],
  pubalgie:   [{id:'hagos', label:'HAGOS',    seuil:75}],
  hanche:     [{id:'hagos', label:'HAGOS',    seuil:75}],
  rachis:     [{id:'odi',   label:'ODI',      seuil:20,inv:true},{id:'ndi',label:'NDI',seuil:14,inv:true}],
  tendon:     [{id:'visap', label:'VISA-P',   seuil:80},{id:'visaa',label:'VISA-A',seuil:80},{id:'tampa',label:'Tampa',seuil:37,inv:true}]
};
var COLORS = ['#6c63ff','#00e676','#ffd740','#ff6b6b','#00b0ff','#fd79a8'];
var sessions = [];
var evaChart = null;
var scoresChart = null;
var MSG_DEL_SESS = 'Supprimer cette evaluation ?';
var MSG_DEL_ALL  = 'Effacer toutes les evaluations de ce patient ?';

document.getElementById('eval-date').value = new Date().toISOString().split('T')[0];

function showStatus(msg, color) {
  var el = document.getElementById('sync-status');
  if (!el) return;
  el.textContent = msg;
  el.style.color = color || 'var(--text3)';
  el.style.display = 'block';
  setTimeout(function(){ el.style.display='none'; }, 3000);
}

function getKey() {
  var nom = document.getElementById('p-nom').value.trim() || 'default';
  return getBilan() + '_' + nom.toLowerCase().replace(/\s+/g,'_');
}

function getBilan() { return document.getElementById('p-type').value; }

async function loadData() {
  showStatus('Chargement...', 'var(--accent2)');
  sessions = await window.KCS_loadSuivi(getKey());
  showStatus('', 'var(--text3)');
  renderAll();
}

async function saveData(cb) {
  showStatus('Sauvegarde...', 'var(--warning)');
  var nom = document.getElementById('p-nom').value.trim();
  var ok = await window.KCS_saveSuivi(getKey(), getBilan(), nom, sessions);
  showStatus(ok ? 'Synchronisé' : 'Erreur sync', ok ? 'var(--success)' : 'var(--danger)');
  if (cb) cb();
}

function saveMeta() { saveData(); }

function renderScoresFields() {
  var scs = SCORES_CFG[getBilan()] || [];
  var div = document.getElementById('scores-fields');
  if (!scs.length) { div.innerHTML=''; return; }
  var html = '<div class="row" style="margin-top:4px;">';
  scs.forEach(function(sc){ html+='<div class="field"><label>'+sc.label+' (/100)</label><input type="number" id="eval-'+sc.id+'" placeholder="0-100" min="0" max="100"></div>'; });
  html += '</div>';
  div.innerHTML = html;
}

function ajouterEval() {
  var date = document.getElementById('eval-date').value;
  if (!date) { alert('Veuillez indiquer une date.'); return; }
  var scs = SCORES_CFG[getBilan()] || [];
  var sv = {};
  scs.forEach(function(sc){ var el=document.getElementById('eval-'+sc.id); if(el&&el.value!=='') sv[sc.id]=parseInt(el.value); });
  var sess = {
    id: Date.now(),
    date: date,
    seance: parseInt(document.getElementById('eval-seance').value) || sessions.length+1,
    eva: {repos: parseInt(document.getElementById('eval-eva-repos').value)||0, effort: parseInt(document.getElementById('eval-eva-effort').value)||0},
    scores: sv,
    notes: document.getElementById('eval-notes').value.trim()
  };
  sessions.push(sess);
  sessions.sort(function(a,b){ return a.date.localeCompare(b.date); });
  saveData(function(){ renderAll(); });
  document.getElementById('eval-seance').value = sessions.length+1;
  document.getElementById('eval-eva-repos').value='';
  document.getElementById('eval-eva-effort').value='';
  scs.forEach(function(sc){ var el=document.getElementById('eval-'+sc.id); if(el) el.value=''; });
  document.getElementById('eval-notes').value='';
}

function toggleImport() {
  var z=document.getElementById('import-zone');
  z.style.display = z.style.display==='none'?'block':'none';
}

function lireCode() {
  var raw=document.getElementById('kcs-code').value.trim();
  if (!raw.startsWith('KCS1:')) { alert('Code invalide.'); return; }
  try {
    var data=JSON.parse(decodeURIComponent(escape(atob(raw.slice(5)))));
    if(data.nom&&!document.getElementById('p-nom').value) document.getElementById('p-nom').value=data.nom;
    if(data.prenom&&!document.getElementById('p-prenom').value) document.getElementById('p-prenom').value=data.prenom;
    if(data.ddn&&!document.getElementById('p-ddn').value) document.getElementById('p-ddn').value=data.ddn;
    if(data.bilan) document.getElementById('p-type').value=data.bilan;
    if(data.eva){
      if(data.eva['v-repos']!==undefined) document.getElementById('eval-eva-repos').value=data.eva['v-repos'];
      if(data.eva['v-effort']!==undefined) document.getElementById('eval-eva-effort').value=data.eva['v-effort'];
    }
    renderScoresFields();
    var scs=SCORES_CFG[data.bilan||getBilan()]||[];
    scs.forEach(function(sc){
      if(data.scores){
        var vals=[];
        Object.keys(data.scores).forEach(function(k){ if(k.startsWith(sc.id+'_')) vals.push(data.scores[k]); });
        if(vals.length){ var avg=Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length/10*100); var el=document.getElementById('eval-'+sc.id); if(el) el.value=avg; }
      }
    });
    document.getElementById('import-zone').style.display='none';
    document.getElementById('kcs-code').value='';
    alert('Donnees importees ! Verifiez et cliquez Ajouter.');
  } catch(e) { alert('Erreur de decodage.'); }
}

function renderAll() {
  renderScoresFields();
  renderSessions();
  if(document.getElementById('pane-graphes').style.display!=='none') renderCharts();
  if(document.getElementById('pane-tableau').style.display!=='none') renderTableau();
}

function chipCls(val,seuil,inv) {
  if(inv) return val<=seuil?'good':val<=seuil*1.5?'mid':'bad';
  return val>=seuil?'good':val>=seuil*0.7?'mid':'bad';
}

function renderSessions() {
  document.getElementById('nb-sess').textContent = sessions.length+' evaluation'+(sessions.length!==1?'s':'');
  var list=document.getElementById('sess-list');
  var scs=SCORES_CFG[getBilan()]||[];
  if (!sessions.length) { list.innerHTML='<div class="empty">Aucune evaluation</div>'; return; }
  var mois2=['jan','fev','mar','avr','mai','jun','jul','aou','sep','oct','nov','dec'];
  list.innerHTML=sessions.map(function(s){
    var d=new Date(s.date);
    var ds=(d.getDate()<10?'0':'')+d.getDate()+' '+mois2[d.getMonth()]+' '+d.getFullYear();
    var chips='<span class="chip '+(s.eva.repos<=3?'good':s.eva.repos<=6?'mid':'bad')+'">Repos '+s.eva.repos+'/10</span>';
    chips+='<span class="chip '+(s.eva.effort<=3?'good':s.eva.effort<=6?'mid':'bad')+'">Effort '+s.eva.effort+'/10</span>';
    scs.forEach(function(sc){ if(s.scores[sc.id]!==undefined) chips+='<span class="chip '+chipCls(s.scores[sc.id],sc.seuil,sc.inv)+'">'+sc.label+' '+s.scores[sc.id]+'%</span>'; });
    return '<div class="sess-item">'
      +'<div class="sess-date">S'+s.seance+'<br>'+ds+'</div>'
      +'<div class="sess-chips">'+chips+'</div>'
      +(s.notes?'<span class="sess-note" title="'+s.notes+'">'+s.notes+'</span>':'')
      +'<span class="sess-del" onclick="delSess('+s.id+')">x</span>'
      +'</div>';
  }).join('');
}

function delSess(id) {
  if (!window.confirm(MSG_DEL_SESS)) return;
  sessions = sessions.filter(function(s){ return s.id!==id; });
  saveData(function(){ renderAll(); });
}

function renderCharts() {
  if (sessions.length < 2) return;
  var labels=sessions.map(function(s){ return 'S'+s.seance; });
  var evaCtx=document.getElementById('chart-eva').getContext('2d');
  if(evaChart) evaChart.destroy();
  evaChart=new Chart(evaCtx,{type:'line',data:{labels:labels,datasets:[
    {label:'EVA Repos',data:sessions.map(function(s){return s.eva.repos;}),borderColor:'#ff5252',backgroundColor:'rgba(255,82,82,0.1)',tension:0.3,pointRadius:5,fill:true},
    {label:'EVA Effort',data:sessions.map(function(s){return s.eva.effort;}),borderColor:'#ffd740',backgroundColor:'rgba(255,215,64,0.1)',tension:0.3,pointRadius:5,fill:true}
  ]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{min:0,max:10,grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#9fa8da'}},x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#9fa8da'}}},plugins:{legend:{labels:{color:'#e8eaf6'}}}}});
  var scs=SCORES_CFG[getBilan()]||[];
  if (!scs.length) return;
  var scCtx=document.getElementById('chart-scores').getContext('2d');
  if(scoresChart) scoresChart.destroy();
  scoresChart=new Chart(scCtx,{type:'line',data:{labels:labels,datasets:scs.map(function(sc,i){return{label:sc.label,data:sessions.map(function(s){return s.scores[sc.id]!==undefined?s.scores[sc.id]:null;}),borderColor:COLORS[i%COLORS.length],tension:0.3,pointRadius:5,fill:false,spanGaps:true};})},options:{responsive:true,maintainAspectRatio:false,scales:{y:{min:0,max:100,grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#9fa8da'}},x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#9fa8da'}}},plugins:{legend:{labels:{color:'#e8eaf6'}}}}});
}

function renderTableau() {
  var div=document.getElementById('tableau-content');
  if (sessions.length<2) { div.innerHTML='<div class="empty">Ajoutez au moins 2 evaluations pour comparer</div>'; return; }
  var scs=SCORES_CFG[getBilan()]||[];
  var mois3=['jan','fev','mar','avr','mai','jun','jul','aou','sep','oct','nov','dec'];
  var rows=[
    {label:'EVA Repos',vals:sessions.map(function(s){return s.eva.repos;}),unit:'/10',inv:true,seuil:3},
    {label:'EVA Effort',vals:sessions.map(function(s){return s.eva.effort;}),unit:'/10',inv:true,seuil:3}
  ];
  scs.forEach(function(sc){ rows.push({label:sc.label,vals:sessions.map(function(s){return s.scores[sc.id]!==undefined?s.scores[sc.id]:null;}),unit:'%',inv:sc.inv||false,seuil:sc.seuil}); });
  var html='<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:13px;">';
  html+='<thead><tr style="border-bottom:2px solid var(--border2);">';
  html+='<th style="text-align:left;padding:10px 8px;color:var(--text3);font-size:11px;text-transform:uppercase;">Mesure</th>';
  sessions.forEach(function(s){ var d=new Date(s.date); html+='<th style="text-align:center;padding:10px 8px;color:var(--text3);font-size:11px;">S'+s.seance+'<br><span style="font-weight:400;">'+(d.getDate()<10?'0':'')+d.getDate()+' '+mois3[d.getMonth()]+'</span></th>'; });
  html+='<th style="text-align:center;padding:10px 8px;color:var(--text3);font-size:11px;">Evolution</th></tr></thead><tbody>';
  rows.forEach(function(row){
    html+='<tr style="border-bottom:1px solid var(--border);"><td style="padding:10px 8px;font-weight:600;">'+row.label+'</td>';
    row.vals.forEach(function(v){ html+='<td style="text-align:center;padding:10px 8px;">'+(v!==null?v+row.unit:'—')+'</td>'; });
    var first=null,last=null;
    for(var i=0;i<row.vals.length;i++){if(row.vals[i]!==null&&first===null)first=row.vals[i];}
    for(var j=row.vals.length-1;j>=0;j--){if(row.vals[j]!==null){last=row.vals[j];break;}}
    var evo='';
    if(first!==null&&last!==null){var diff=last-first;var pct=first!==0?Math.round((diff/first)*100):0;var good=row.inv?diff<0:diff>0;var col=good?'var(--success)':diff===0?'var(--text3)':'var(--danger)';evo='<span style="color:'+col+';font-weight:700;">'+(diff>0?'+':'')+diff+row.unit+'<br><small>'+(pct>0?'+':'')+pct+'%</small></span>';}
    html+='<td style="text-align:center;padding:10px 8px;">'+evo+'</td></tr>';
  });
  html+='</tbody></table></div>';
  var notes=sessions.filter(function(s){return s.notes;});
  if(notes.length){html+='<div style="margin-top:16px;border-top:1px solid var(--border);padding-top:12px;"><div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:8px;">Notes cliniques</div>';notes.forEach(function(s){html+='<div style="margin-bottom:6px;font-size:12px;"><strong style="color:var(--accent2);">S'+s.seance+'</strong> '+s.notes+'</div>';});html+='</div>';}
  div.innerHTML=html;
}

function switchTab(tab) {
  ['saisie','graphes','tableau'].forEach(function(t){
    document.getElementById('pane-'+t).style.display = t===tab?'block':'none';
    document.getElementById('tab-'+t).className = 'tab'+(t===tab?' active':'');
  });
  if(tab==='graphes') renderCharts();
  if(tab==='tableau') renderTableau();
}

function clearAll() {
  if (!window.confirm(MSG_DEL_ALL)) return;
  sessions=[];
  saveData(function(){ renderAll(); });
}

// Démarrer
loadData();
</script>
</body>
</html>
